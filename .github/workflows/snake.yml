name: Generate Profile Assets

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake game from GitHub contribution grid
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate trophy SVG (self-hosted, avoids the shared instance)
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: ${{ github.repository_owner }}
          output_path: dist/trophy.svg
          theme: darkhub
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate streak stats SVG (self-hosted, avoids the shared instance)
        continue-on-error: true
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=dark&hide_border=true&background=0D1117
          path: dist/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug - list dist contents
        run: |
          echo "=== dist contents ===" > /tmp/debug.txt
          ls -la dist >> /tmp/debug.txt 2>&1 || echo "dist missing" >> /tmp/debug.txt
          find dist -type f >> /tmp/debug.txt 2>&1 || true
          cat /tmp/debug.txt

      - name: Commit debug file to repo
        run: |
          cp /tmp/debug.txt debug.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add debug.txt
          git commit -m "debug: dist listing" || echo "nothing to commit"
          git push || echo "push failed"

      - name: Push all generated assets to output branch (single push, no clobbering)
        if: always()
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
